<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 4rem 1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid #f0f0f0;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.02em;
    }

    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .add-form input {
      flex: 1;
      padding: 0.55rem 0.85rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-form input:focus {
      border-color: #1a1a1a;
    }

    .add-form input::placeholder {
      color: #bbb;
    }

    .add-form button {
      padding: 0.55rem 1rem;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .add-form button:hover {
      opacity: 0.75;
    }

    .priority-select {
      padding: 0.55rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #1a1a1a;
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .priority-select:focus {
      border-color: #1a1a1a;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-high   { background: #e05252; }
    .dot-medium { background: #f0a030; }
    .dot-low    { background: #4caf50; }
    .dot-none   { background: #ddd; }

    .task-list {
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 2rem;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .task-item:hover {
      background: #fafafa;
    }

    .task-item input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #1a1a1a;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-label {
      flex: 1;
      font-size: 0.9rem;
      color: #1a1a1a;
      cursor: pointer;
      line-height: 1.4;
    }

    .task-item.done .task-label {
      text-decoration: line-through;
      color: #bbb;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0.1rem 0.2rem;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e05252;
    }

    .filter-bar {
      display: flex;
      gap: 0.25rem;
      margin-top: 1rem;
    }

    .filter-btn {
      padding: 0.3rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      background: white;
      font-size: 0.8rem;
      font-family: inherit;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover {
      border-color: #1a1a1a;
      color: #1a1a1a;
    }

    .filter-btn.active {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: white;
    }

    .empty {
      padding: 2rem;
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Tasks</h1>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
        <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
      </div>
      <form class="add-form" onsubmit="addTask(event)">
        <input type="text" id="taskInput" placeholder="Add a task…" autocomplete="off">
        <select class="priority-select" id="priorityInput">
          <option value="none">— priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <button type="submit">Add</button>
      </form>
    </div>
    <ul class="task-list" id="taskList">
      <li class="empty" id="emptyMsg">No tasks yet.</li>
    </ul>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';
    render();

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('taskList');
      const empty = document.getElementById('emptyMsg');
      list.innerHTML = '';

      const visible = tasks.filter(t =>
        filter === 'all' ? true : filter === 'active' ? !t.done : t.done
      );

      if (visible.length === 0) {
        empty.textContent = filter === 'active' ? 'No active tasks.' : filter === 'completed' ? 'No completed tasks.' : 'No tasks yet.';
        list.appendChild(empty);
        return;
      }

      visible.forEach((task) => {
        const i = tasks.indexOf(task);
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');

        const dot = document.createElement('span');
        dot.className = 'dot dot-' + (task.priority || 'none');
        dot.title = task.priority ? task.priority + ' priority' : 'no priority';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = task.done;
        cb.onchange = () => toggle(i);

        const label = document.createElement('span');
        label.className = 'task-label';
        label.textContent = task.text;
        label.onclick = () => toggle(i);

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.innerHTML = '&times;';
        del.title = 'Delete';
        del.onclick = () => remove(i);

        li.append(dot, cb, label, del);
        list.appendChild(li);
      });
    }

    function addTask(e) {
      e.preventDefault();
      const input = document.getElementById('taskInput');
      const priority = document.getElementById('priorityInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, done: false, priority: priority.value === 'none' ? null : priority.value });
      input.value = '';
      priority.value = 'none';
      save();
      render();
    }

    function toggle(i) {
      tasks[i].done = !tasks[i].done;
      save();
      render();
    }

    function remove(i) {
      tasks.splice(i, 1);
      save();
      render();
    }
  </script>
</body>
</html>
